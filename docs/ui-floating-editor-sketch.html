<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BatchRefiner UI 草图 - 无左栏悬浮编辑栏</title>
  <style>
    :root {
      --bg: #f8f6f1;
      --paper: #fffefa;
      --ink: #25231f;
      --muted: #81786d;
      --line: rgba(37, 35, 31, 0.1);
      --soft: rgba(255, 255, 255, 0.76);
      --accent: #df7658;
      --shadow: 0 18px 55px rgba(35, 29, 20, 0.12);
      --radius: 31px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 16%, rgba(223, 118, 88, 0.08), transparent 28%),
        linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: ui-serif, Georgia, "Times New Roman", "Noto Serif SC", serif;
    }

    button {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      padding: 22px 24px 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      height: 44px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .brand span {
      color: var(--muted);
      font-weight: 400;
    }

    .project-menu {
      border: 0;
      background: transparent;
      color: var(--ink);
      padding: 0;
      font: inherit;
      font-weight: 700;
    }

    .project-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-progress {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .mini-bar {
      width: 74px;
      height: 5px;
      border-radius: 999px;
      background: #e7e0d5;
      overflow: hidden;
    }

    .mini-bar i {
      display: block;
      width: 18%;
      height: 100%;
      background: var(--accent);
    }

    .ghost-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.54);
      color: var(--muted);
      padding: 7px 11px;
      font-size: 12px;
      cursor: default;
    }

    .ghost-btn.weak {
      opacity: 0.62;
    }

    .workspace {
      position: relative;
      min-height: calc(100vh - 88px);
      margin-top: 16px;
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
      overflow: hidden;
    }

    .task-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(1180px, calc(100% - 80px));
      margin: 34px auto 24px;
      font-family: "Noto Sans SC", ui-sans-serif, system-ui, sans-serif;
    }

    .task-head h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .task-head small {
      margin-left: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .view-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 6px 18px rgba(34, 28, 20, 0.08);
    }

    .view-toggle span {
      border-radius: 999px;
      padding: 6px 13px;
      color: var(--muted);
      font-size: 12px;
    }

    .view-toggle span:first-child {
      background: #2b2925;
      color: white;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(170px, 1fr));
      gap: 20px;
      width: min(1180px, calc(100% - 80px));
      margin: 0 auto;
      padding-bottom: 240px;
    }

    .task-card {
      min-height: 222px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fffdfa;
      box-shadow: 0 8px 22px rgba(28, 24, 18, 0.06);
      overflow: hidden;
    }

    .thumb {
      height: 146px;
      display: grid;
      place-items: center;
      background: #f5f2ec;
      color: rgba(37, 35, 31, 0.15);
      font-family: "Noto Sans SC", ui-sans-serif, system-ui, sans-serif;
      font-size: 20px;
    }

    .task-meta {
      padding: 12px 14px;
      font-family: "Noto Sans SC", ui-sans-serif, system-ui, sans-serif;
    }

    .task-meta small {
      display: block;
      color: var(--muted);
      font-size: 10px;
    }

    .task-meta b {
      display: block;
      margin-top: 5px;
      font-size: 13px;
    }

    .dock-wrap {
      position: absolute;
      left: 50%;
      bottom: 30%;
      width: min(936px, calc(100% - 96px));
      transform: translateX(-50%);
    }

    .tabs {
      display: flex;
      gap: 10px;
      padding-left: 2px;
      margin-bottom: -1px;
    }

    .tab {
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-bottom: 0;
      border-radius: 20px 20px 0 0;
      background: rgba(255, 255, 255, 0.66);
      color: var(--muted);
      padding: 10px 29px 13px;
      font-family: "Noto Sans SC", ui-sans-serif, system-ui, sans-serif;
      font-size: 14px;
      font-weight: 650;
    }

    .tab.active {
      background: var(--paper);
      color: var(--accent);
      box-shadow: 0 -8px 30px rgba(35, 29, 20, 0.06);
    }

    .dock {
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      background: rgba(255, 255, 255, 0.84);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      min-height: 286px;
      padding: 23px 26px;
      font-family: "Noto Sans SC", ui-sans-serif, system-ui, sans-serif;
    }

    .mode-panel {
      display: grid;
      gap: 18px;
      min-height: 238px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      grid-area: 1 / 1;
    }

    .mode-panel.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .mode-stack {
      display: grid;
    }

    .global-layout {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      gap: 18px;
      height: 238px;
    }

    .global-side {
      display: grid;
      grid-template-rows: 74px 1fr auto;
      gap: 12px;
      min-width: 0;
    }

    .ref-picker {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .ref-stack {
      position: relative;
      width: 84px;
      height: 60px;
      flex: 0 0 auto;
    }

    .ref-card {
      position: absolute;
      top: 7px;
      width: 38px;
      height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 12px;
      background: linear-gradient(135deg, #f7f1e8, #ebe2d3);
      box-shadow: 0 10px 24px rgba(35, 29, 20, 0.11);
    }

    .ref-card:nth-child(1) {
      left: 0;
      transform: rotate(-8deg);
    }

    .ref-card:nth-child(2) {
      left: 18px;
      transform: rotate(3deg);
    }

    .ref-plus {
      position: absolute;
      right: 2px;
      bottom: 1px;
      display: grid;
      place-items: center;
      width: 27px;
      height: 27px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fffdfa;
      color: var(--ink);
      font-size: 18px;
      box-shadow: 0 8px 18px rgba(35, 29, 20, 0.12);
    }

    .ref-label {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .skill-stack {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .skill-deck {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .skill-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.78);
      width: 66px;
      aspect-ratio: 1 / 1.414;
      padding: 9px 8px;
      color: var(--ink);
      cursor: default;
      box-shadow: 0 12px 28px rgba(35, 29, 20, 0.09);
    }

    .skill-card b {
      display: block;
      font-size: 11px;
      line-height: 1.25;
    }

    .skill-card span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.35;
    }

    .skill-card.add {
      display: grid;
      place-items: center;
      border-style: dashed;
      color: var(--muted);
      font-size: 20px;
      box-shadow: none;
    }

    .opt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      padding: 7px 9px 7px 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .switch {
      position: relative;
      width: 38px;
      height: 22px;
      border-radius: 999px;
      background: #ded8ce;
      flex: 0 0 auto;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 18px;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 4px 10px rgba(223, 118, 88, 0.32);
    }

    .global-main {
      display: grid;
      grid-template-rows: 1fr auto;
      min-width: 0;
    }

    .field-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .panel-row {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .single-panel-inner {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 238px;
    }

    .icon-btn {
      display: grid;
      place-items: center;
      width: 55px;
      height: 55px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: #f6f0e7;
      color: var(--muted);
      flex: 0 0 auto;
      font-size: 22px;
    }

    .input {
      flex: 1;
      min-height: 68px;
      border: 0;
      outline: 0;
      resize: none;
      background: transparent;
      color: var(--ink);
      font-size: 15px;
      line-height: 1.7;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      padding: 8px 14px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 650;
    }

    .chip.muted {
      color: var(--muted);
      font-weight: 500;
    }

    .send {
      margin-left: auto;
      width: 55px;
      height: 55px;
      border: 0;
      border-radius: 999px;
      background: #1f1d1a;
      color: white;
      font-size: 22px;
      box-shadow: 0 12px 28px rgba(31, 29, 26, 0.2);
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 286px;
      color: var(--muted);
      font-size: 13px;
    }

    .bar {
      width: 125px;
      height: 8px;
      border-radius: 999px;
      background: #e7e0d5;
      overflow: hidden;
    }

    .bar i {
      display: block;
      width: 18%;
      height: 100%;
      background: var(--accent);
    }

    .editor-modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(37, 35, 31, 0.2);
      backdrop-filter: blur(8px);
      z-index: 20;
    }

    .editor-modal.open {
      display: grid;
    }

    .editor {
      width: min(620px, calc(100vw - 56px));
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      padding: 22px;
      font-family: "Noto Sans SC", ui-sans-serif, system-ui, sans-serif;
    }

    .editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .editor textarea {
      width: 100%;
      height: 260px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fffdfa;
      padding: 14px;
      resize: none;
      color: var(--ink);
      font: inherit;
      line-height: 1.7;
      outline: none;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: repeat(2, minmax(150px, 1fr));
      }

      .dock-wrap,
      .task-head,
      .grid {
        width: calc(100% - 32px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        BatchRefiner <span>/</span>
        <button class="project-menu">未命名项目 ▾</button>
      </div>
      <div class="project-actions">
        <span class="ghost-btn top-progress">0 / 6 完成 <span class="mini-bar"><i></i></span></span>
        <button class="ghost-btn">历史生图</button>
        <button class="ghost-btn">设置</button>
        <button class="ghost-btn weak">导入图片</button>
      </div>
    </header>

    <main class="workspace">
      <div class="task-head">
        <h1>当前任务 <small>共 6 项</small></h1>
        <div class="view-toggle">
          <span>网格</span>
          <span>列表</span>
        </div>
      </div>

      <section class="grid" aria-label="任务卡片草图">
        <article class="task-card"><div class="thumb">▧</div><div class="task-meta"><small>#001</small><b>任务标题</b><small>待处理</small></div></article>
        <article class="task-card"><div class="thumb">▧</div><div class="task-meta"><small>#002</small><b>任务标题</b><small>待处理</small></div></article>
        <article class="task-card"><div class="thumb">▧</div><div class="task-meta"><small>#003</small><b>任务标题</b><small>待处理</small></div></article>
        <article class="task-card"><div class="thumb">▧</div><div class="task-meta"><small>#004</small><b>任务标题</b><small>待处理</small></div></article>
        <article class="task-card"><div class="thumb">▧</div><div class="task-meta"><small>#005</small><b>任务标题</b><small>待处理</small></div></article>
        <article class="task-card"><div class="thumb">▧</div><div class="task-meta"><small>#006</small><b>任务标题</b><small>待处理</small></div></article>
      </section>

      <section class="dock-wrap" aria-label="悬浮编辑栏草图">
        <div class="tabs">
          <button class="tab active" data-mode="global">全局</button>
          <button class="tab" data-mode="single">单图</button>
        </div>

        <div class="dock">
          <div class="mode-stack">
            <div class="mode-panel active" id="global-panel">
              <div class="global-layout">
                <aside class="global-side">
                  <div class="ref-picker" title="点击导入，多图叠放；悬停展开">
                    <div class="ref-stack">
                      <span class="ref-card"></span>
                      <span class="ref-card"></span>
                      <span class="ref-plus">+</span>
                    </div>
                    <div class="ref-label">全局参考图<br />点击导入多张</div>
                  </div>
                  <div class="skill-stack">
                    <div class="field-label">提示词 Skills</div>
                    <div class="skill-deck">
                      <div class="skill-card" data-skill="产品主体保持">
                        <b>产品主体保持</b>
                        <span>双击编辑</span>
                      </div>
                      <div class="skill-card" data-skill="电商海报风格">
                        <b>电商海报风格</b>
                        <span>A4 卡片</span>
                      </div>
                      <div class="skill-card add">+</div>
                    </div>
                  </div>
                  <div class="opt-row">
                    <span>提示词优化</span>
                    <span class="switch" aria-hidden="true"></span>
                  </div>
                </aside>
                <div class="global-main">
                  <div>
                    <div class="field-label">全局指令 / 全局提示词</div>
                    <textarea class="input" readonly>写全局指令、全局提示词。这里影响后续新建任务和批量默认生成策略。</textarea>
                  </div>
                  <div class="panel-row">
                    <div class="chips">
                      <span class="chip">默认模型</span>
                      <span class="chip muted">自动 / 1K / x1</span>
                    </div>
                    <button class="send">▶</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="mode-panel" id="single-panel">
                <div class="single-panel-inner">
                  <div class="panel-row">
                  <div class="ref-picker" title="点击导入，多图叠放；悬停展开">
                    <div class="ref-stack">
                      <span class="ref-card"></span>
                      <span class="ref-plus">+</span>
                    </div>
                  </div>
                  <textarea class="input" readonly>当前单图提示词放这里。只编辑当前选中的卡片。</textarea>
                  <button class="send">↑</button>
                </div>
                <div class="panel-row">
                  <div class="chips">
                    <span class="chip">当前：#003</span>
                    <span class="chip">单图参考图</span>
                    <span class="chip">单图模型</span>
                    <span class="chip muted">自动 / 2K / x1</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="editor-modal" id="skill-editor" aria-label="提示词 Skill 编辑器">
    <div class="editor">
      <div class="editor-head">
        <span id="editor-title">提示词 Skill</span>
        <button class="ghost-btn" id="close-editor">关闭</button>
      </div>
      <textarea>这里是 skill 文本编辑器示意。实际实现时沿用原来的 skills 文档编辑、保存和优化开关逻辑。</textarea>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const panels = {
      global: document.querySelector('#global-panel'),
      single: document.querySelector('#single-panel'),
    };

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        tabs.forEach((item) => item.classList.remove('active'));
        Object.values(panels).forEach((panel) => panel.classList.remove('active'));
        tab.classList.add('active');
        panels[tab.dataset.mode].classList.add('active');
      });
    });

    const editor = document.querySelector('#skill-editor');
    const editorTitle = document.querySelector('#editor-title');
    document.querySelectorAll('.skill-card[data-skill]').forEach((card) => {
      card.addEventListener('dblclick', () => {
        editorTitle.textContent = card.dataset.skill || '提示词 Skill';
        editor.classList.add('open');
      });
    });
    document.querySelector('#close-editor').addEventListener('click', () => {
      editor.classList.remove('open');
    });
  </script>
</body>
</html>
