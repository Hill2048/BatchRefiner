<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BatchRefiner 更新封面</title>
    <style>
      :root {
        --panel: #fbfaf6;
        --ink: #171411;
        --line: rgba(23, 20, 17, 0.08);
        --terracotta: #d97854;
        --sage: #c7d6cf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 12% 10%, rgba(217, 120, 84, 0.08), transparent 24%),
          linear-gradient(180deg, #f7f3ec 0%, #efebe4 100%);
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
      }

      .cover {
        width: min(1180px, calc(100vw - 36px));
        border-radius: 34px;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 24px 72px rgba(28, 19, 10, 0.08);
        padding: 28px;
      }

      .hero {
        overflow: hidden;
        border-radius: 28px;
        background:
          radial-gradient(circle at 18% 26%, rgba(255, 255, 255, 0.14), transparent 20%),
          radial-gradient(circle at 72% 24%, rgba(255, 255, 255, 0.1), transparent 18%),
          linear-gradient(135deg, #d97854 0%, #d97854 38%, #d39d84 62%, #efe8de 100%);
      }

      .hero-inner {
        position: relative;
        min-height: 540px;
        padding: 42px;
      }

      .visual {
        position: absolute;
        inset: 42px;
        background:
          radial-gradient(circle at 22% 24%, rgba(255, 255, 255, 0.12), transparent 22%),
          radial-gradient(circle at 78% 32%, rgba(255, 255, 255, 0.12), transparent 18%),
          linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
        background-size: auto, 28px 28px, 28px 28px;
        border-radius: 24px;
      }

      .logo-frame {
        position: absolute;
        left: 6%;
        top: 50%;
        width: min(420px, 42%);
        aspect-ratio: 1;
        border-radius: 32px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        transform: translateY(-50%);
      }

      .logo-frame::before,
      .logo-frame::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.16);
      }

      .logo-frame::before {
        inset: -42px;
      }

      .logo-frame::after {
        inset: -88px;
        opacity: 0.45;
      }

      .logo-frame img {
        width: 68%;
        height: 68%;
        object-fit: contain;
        filter: brightness(0) invert(1);
      }

      .mini-card {
        position: absolute;
        right: 8%;
        top: 18%;
        width: min(260px, 24%);
        aspect-ratio: 1 / 1;
        padding: 18px;
        border-radius: 22px;
        background: rgba(251, 250, 246, 0.92);
        border: 1px solid rgba(23, 20, 17, 0.08);
        box-shadow: 0 18px 36px rgba(23, 20, 17, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .mini-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(rgba(23, 20, 17, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(23, 20, 17, 0.05) 1px, transparent 1px);
        background-size: 24px 24px;
        border-radius: 22px;
      }

      .mini-card::after {
        content: "";
        width: 62%;
        height: 62%;
        border-radius: 20px;
        background:
          linear-gradient(rgba(23, 20, 17, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(23, 20, 17, 0.06) 1px, transparent 1px),
          rgba(255, 255, 255, 0.92);
        background-size: 18px 18px, 18px 18px, auto;
        border: 1px solid rgba(23, 20, 17, 0.06);
        position: relative;
        z-index: 1;
      }

      .accent-orb {
        position: absolute;
        right: 11%;
        bottom: 13%;
        width: min(112px, 11%);
        aspect-ratio: 1;
        border-radius: 50%;
        background: rgba(251, 250, 246, 0.42);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .accent-bar {
        position: absolute;
        right: 19%;
        bottom: 18%;
        width: 18%;
        height: 14px;
        border-radius: 999px;
        background: rgba(251, 250, 246, 0.44);
        border: 1px solid rgba(255, 255, 255, 0.24);
      }

      @media (max-width: 900px) {
        .visual {
          inset: 30px;
        }
      }

      @media (max-width: 640px) {
        .cover {
          padding: 18px;
          border-radius: 24px;
        }

        .hero {
          border-radius: 22px;
        }

        .hero-inner {
          min-height: 460px;
          padding: 22px;
        }

        .visual {
          inset: 22px;
        }

        .logo-frame {
          width: 62%;
          left: 2%;
          top: 50%;
        }

        .mini-card {
          width: 34%;
          right: 4%;
          top: 16%;
        }

        .accent-orb {
          width: 14%;
          right: 8%;
          bottom: 11%;
        }

        .accent-bar {
          width: 20%;
          right: 20%;
        }
      }
    </style>
  </head>
  <body>
    <section class="cover">
      <div class="hero">
        <div class="hero-inner">
          <div class="visual">
            <div class="logo-frame">
              <img src="../public/flora.svg" alt="BatchRefiner logo" />
            </div>

            <div class="mini-card">
            </div>
            <div class="accent-orb"></div>
            <div class="accent-bar"></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
